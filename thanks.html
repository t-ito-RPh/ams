<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送信完了 | 株式会社アムズメディカル</title>
  <style>
    :root {
      --bg: #fcf8f7;
      --white: #ffffff;
      --main: #d8a8af;
      --main-dark: #b9828a;
      --sub-green: #dce7e1;
      --text: #403a39;
      --text-soft: #6f6766;
      --shadow: 0 10px 30px rgba(90, 70, 70, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      line-height: 1.8;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(216, 168, 175, 0.18), transparent 28%),
        radial-gradient(circle at left bottom, rgba(220, 231, 225, 0.28), transparent 24%),
        var(--bg);
    }

    a {
      color: var(--text);
    }

    .container {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 80px;
    }

    .card {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px 32px;
      text-align: center;
    }

    .icon-wrap {
      width: 76px;
      height: 76px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sub-green), #eef6f1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px rgba(120, 150, 135, 0.18);
    }

    .icon-wrap span {
      font-size: 2rem;
      color: #5c8a70;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.9rem, 4vw, 2.4rem);
      line-height: 1.4;
    }

    p {
      margin: 0 0 14px;
      color: var(--text-soft);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      padding: 13px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      background: linear-gradient(135deg, var(--main-dark), var(--main));
      color: #fff;
      box-shadow: 0 10px 20px rgba(185, 130, 138, 0.25);
    }

    footer {
      text-align: center;
      color: var(--text-soft);
      font-size: 0.92rem;
      margin-top: 20px;
    }

    @media (max-width: 640px) {
      .container {
        width: min(100% - 20px, 760px);
        padding-top: 24px;
      }

      .card {
        padding: 28px 20px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <main class="card">
      <div class="icon-wrap">
        <span>✓</span>
      </div>
      <h1>お問い合わせを受け付けました</h1>
      <p>ご連絡ありがとうございます。</p>
      <p>内容を確認のうえ、必要に応じてご返信いたします。</p>
      <p>送信内容によっては、確認にお時間をいただく場合があります。</p>

      <a class="button" href="./">トップページに戻る</a>
    </main>

    <footer>
      <p>© 株式会社アムズメディカル</p>
    </footer>
  </div>
</body>
</html>
